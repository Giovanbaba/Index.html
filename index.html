<style>

<body>
<div id="header">
  <div class="sub">⚽ ACCF Football HOUDENG · U9B · 5v5</div>
  <h1>Gestionnaire Rotations</h1>
  <div class="desc">Jorvie 50min fixe · 4 postes × 50min ÷ N joueurs de champ = temps égal pour tous</div>
</div>
<div id="tabs">
  <button class="tab-btn active" onclick="showTab('match')">🗓️ Match</button>
  <button class="tab-btn" onclick="showTab('history')">📋 Historique</button>
  <button class="tab-btn" onclick="showTab('roster')">👥 Effectif</button>
</div>
<div id="app">
  <div id="tab-match"></div>
  <div id="tab-history" style="display:none"></div>
  <div id="tab-roster" style="display:none"></div>
</div>
<script>
// ════════════════════════════════════════════════════════
// JOUEURS
// ════════════════════════════════════════════════════════
const PLAYERS = [
  { name:"Jorvie",  pos:["GK"],               fixed:true },
  { name:"Tessio",  pos:["DC"] },
  { name:"Raf",     pos:["DC","N7","N11","N9"] },
  { name:"Ricardo", pos:["DC"] },
  { name:"Aidan",   pos:["DC"] },
  { name:"Sandro",  pos:["N7","N11"] },
  { name:"Dario",   pos:["N7","N11"] },
  { name:"Thymao",  pos:["N7","N11"] },
  { name:"Noam",    pos:["N7","N11"] },
  { name:"Mathias", pos:["N7","N11","N9"] },
  { name:"Isaac",   pos:["N9"] },
];
const ALL   = PLAYERS.map(p => p.name);
const SLOTS = ["GK","DC","N7","N11","N9"];
const POS   = {
  GK:  { label:"Gardien",   num:"GK",   emoji:"🧤", color:"#f39c12", bg:"#2a1a00" },
  DC:  { label:"Défenseur", num:"n°3",  emoji:"🛡️", color:"#3498db", bg:"#001828" },
  N7:  { label:"Ailier G",  num:"n°7",  emoji:"⚡", color:"#2ecc71", bg:"#002810" },
  N11: { label:"Ailier D",  num:"n°11", emoji:"⚡", color:"#1abc9c", bg:"#002820" },
  N9:  { label:"Attaquant", num:"n°9",  emoji:"⚽", color:"#e74c3c", bg:"#280000" },
};
const ROT_COLORS = [
  "#2196f3","#9c27b0","#4caf50","#f44336",
  "#ff9800","#00bcd4","#e91e63","#8bc34a",
  "#ff5722","#607d8b","#795548","#009688"
];

function gP(n)     { return PLAYERS.find(p => p.name === n); }
function can(n, p) { return gP(n).pos.includes(p); }
function fmt(ds)   { if(!ds)return""; const[y,m,d]=ds.split("-"); return`${d}/${m}/${y}`; }
function daysB(d1,d2){ return Math.round((new Date(d2)-new Date(d1))/864e5); }
function loadLS(k,d){ try{ return JSON.parse(localStorage.getItem(k))||d; }catch{ return d; } }
function saveLS(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }

const S = {
  tab:"match", date:"", present:new Set(ALL),
  hist:loadLS("accf7_h",{}), matches:loadLS("accf7_m",[]),
  plan:null, alerts:[], saved:false
};

// ════════════════════════════════════════════════════════
// ALGORITHME — TEMPS ÉGAL POUR TOUS LES JOUEURS DE CHAMP
//
// RÈGLE FONDAMENTALE :
//   Jorvie = gardien fixe, joue 50 min sans interruption.
//   Les joueurs de CHAMP se partagent les 4 postes sur 50 min.
//
//   Temps disponible = 4 postes × 50 min = 200 min-poste
//   N = nombre de joueurs de champ présents
//   Temps par joueur = 200 / N minutes (exactement égal)
//
//   Exemples :
//     4 joueurs de champ → 200/4 = 50 min chacun (ils jouent tout le match)
//     5 joueurs de champ → 200/5 = 40 min chacun
//     6 joueurs de champ → 200/6 ≈ 33.33 min (4 joueurs 33min, 2 joueurs 34min)
//     7 joueurs de champ → 200/7 ≈ 28.57 min (4 joueurs 29min, 3 joueurs 28min)
//     8 joueurs de champ → 200/8 = 25 min chacun (exactement)
//
// MÉTHODE DE DÉCOUPAGE EN TRANCHES :
//   On crée N tranches de durée égale = 50/N minutes.
//   Dans chaque tranche i, 4 joueurs jouent (les autres se reposent).
//   On fait tourner de façon cyclique : tranche i → joueurs [i, i+1, i+2, i+3] mod N
//   Résultat : chaque joueur apparaît dans exactement 4 tranches sur N.
//   Temps de jeu = 4 × (50/N) = 200/N ✓ ÉGAL POUR TOUS
//
//   Pour les cas non-entiers (6 ou 7 joueurs) :
//   On distribue les secondes résiduelles équitablement :
//   certains jouent floor(200/N) min, d'autres ceil(200/N) min.
//   La différence est de 1 minute maximum.
// ════════════════════════════════════════════════════════

// Backtracking : assigner DC, N7, N11, N9 à une équipe de 4 joueurs
function assignPos(team) {
  const FPOS = ["DC","N7","N11","N9"];
  const used = new Set(), res = {};
  function bt(i) {
    if (i === FPOS.length) return true;
    for (const name of team) {
      if (!used.has(name) && can(name, FPOS[i])) {
        used.add(name); res[FPOS[i]] = name;
        if (bt(i+1)) return true;
        used.delete(name); delete res[FPOS[i]];
      }
    }
    return false;
  }
  return bt(0) ? {...res} : null;
}

// Trouver une équipe de 4 valide parmi un pool, en évitant les joueurs trop chargés si possible
function findTeam(pool, playCount, maxAllowed) {
  // Trier : priorité aux joueurs qui ont le moins joué
  const sorted = [...pool].sort((a,b) => (playCount[a]||0) - (playCount[b]||0));
  // Essayer toutes les combos de 4 parmi les plus "frais"
  function* combos(arr, k) {
    if (k===0) { yield []; return; }
    for (let i=0; i<=arr.length-k; i++)
      for (const rest of combos(arr.slice(i+1), k-1)) yield [arr[i], ...rest];
  }
  for (const combo of combos(sorted, 4)) {
    // Vérifier qu'aucun joueur ne dépasse son quota
    if (maxAllowed && combo.some(n => (playCount[n]||0) >= maxAllowed)) continue;
    const ass = assignPos(combo);
    if (ass) return { team: combo, ass };
  }
  // Si aucune combo "propre", essayer sans contrainte de quota
  for (const combo of combos(sorted, 4)) {
    const ass = assignPos(combo);
    if (ass) return { team: combo, ass };
  }
  return null;
}

function buildPlan(field) {
  // field = joueurs de champ présents (sans Jorvie)
  const N = field.length;

  // Vérif : chaque poste couvert ?
  for (const pos of ["DC","N7","N11","N9"]) {
    if (!field.some(n => can(n, pos)))
      return { error: `Aucun joueur disponible pour le poste ${POS[pos].label} (${POS[pos].num}).` };
  }

  // ── Calcul du temps cible ──
  // 200 min-poste / N joueurs = temps exact par joueur
  const exactMin  = 200 / N;                    // ex: 7 joueurs → 28.571...
  const floorMin  = Math.floor(exactMin);        // ex: 28
  const ceilMin   = Math.ceil(exactMin);         // ex: 29
  // Combien de joueurs ont le temps "ceil" ?
  // N * exactMin = 200 → x*ceil + (N-x)*floor = 200
  // x*(ceil-floor) = 200 - N*floor
  const nCeil     = Math.round(200 - N * floorMin); // nb joueurs avec +1 min
  const nFloor    = N - nCeil;                       // nb joueurs avec floor min

  // ── Nombre de tranches ──
  // On veut N tranches de durée 50/N min chacune.
  // Chaque joueur joue dans exactement 4 tranches → 4*(50/N) = 200/N ✓
  const nbSlices  = N;
  const sliceDur  = 50 / N; // durée en minutes de chaque tranche

  // ── Construction des tranches par rotation cyclique ──
  // Tranche i → joueurs aux indices i, i+1, i+2, i+3 (mod N)
  const slices = [];
  const playCount = {};
  field.forEach(n => playCount[n] = 0);

  for (let i = 0; i < nbSlices; i++) {
    // Équipe cyclique
    const cycleTeam = [0,1,2,3].map(k => field[(i+k) % N]);
    let ass = assignPos(cycleTeam);

    if (!ass) {
      // L'équipe cyclique ne peut pas couvrir tous les postes
      // → on cherche une équipe valide de 4 parmi tous les joueurs
      // en privilégiant ceux qui ont joué le moins
      const result = findTeam(field, playCount, null);
      if (!result) return { error: "Impossible de former une équipe valide." };
      ass = result.ass;
      result.team.forEach(n => cycleTeam.splice(0, cycleTeam.length, ...result.team));
    }

    const team = [...cycleTeam];
    team.forEach(n => playCount[n] = (playCount[n]||0) + 1);
    slices.push({ dur: sliceDur, team, ass });
  }

  // ── Calcul des minutes réelles ──
  // Chaque joueur a joué exactement 4 tranches de sliceDur minutes
  // = 4 * (50/N) = 200/N ✓
  // Pour l'affichage, on répartit les secondes résiduelles :
  // nCeil joueurs → ceilMin, nFloor joueurs → floorMin
  // On donne le +1 min aux joueurs qui ont le moins joué au total (équité saison)
  const minutesMap = { "Jorvie": 50 };
  // Trier par historique (moins de minutes au total → priorité au +1 min)
  const sorted = [...field].sort((a,b) => {
    const ta = (S.hist[a]||[]).reduce((s,e) => s+(e.mins||0), 0);
    const tb = (S.hist[b]||[]).reduce((s,e) => s+(e.mins||0), 0);
    return ta - tb;
  });
  sorted.forEach((name, idx) => {
    minutesMap[name] = idx < nCeil ? ceilMin : floorMin;
  });

  return {
    slices, minutesMap, field,
    exactMin, floorMin, ceilMin, nCeil, nFloor, sliceDur: Math.round(sliceDur*100)/100
  };
}

// ════════════════════════════════════════════════════════
// ALERTS
// ════════════════════════════════════════════════════════
function computeAlerts() {
  if (!S.date) { S.alerts = []; return; }
  const out = [];
  [...S.present].filter(n => n !== "Jorvie").forEach(name => {
    const entries = (S.hist[name]||[]).sort((a,b) => b.date.localeCompare(a.date));
    if (!entries.length) return;
    const days = daysB(entries[0].date, S.date);
    if (days < 0) return;
    const last = fmt(entries[0].date);
    if (days <= 7)       out.push({name, type:"w", msg:`Convoqué le ${last} (${days}j) — ⚠️ fatigue !`});
    else if (days <= 14) out.push({name, type:"i", msg:`Convoqué le ${last} (${days}j) — à surveiller`});
  });
  S.alerts = out;
}

// ════════════════════════════════════════════════════════
// ACTIONS
// ════════════════════════════════════════════════════════
function toggle(name) {
  if (gP(name).fixed) return;
  S.present.has(name) ? S.present.delete(name) : S.present.add(name);
  S.plan = null; S.saved = false;
  computeAlerts(); renderMatch();
}

function generate() {
  if (!S.date) { alert("Choisis une date de match !"); return; }
  const field = [...S.present].filter(n => n !== "Jorvie");
  if (field.length < 4) { alert("Il faut au moins 4 joueurs de champ !"); return; }
  const res = buildPlan(field);
  if (res.error) { alert(res.error); return; }
  S.plan = res;
  S.saved = false;
  renderMatch();
}

function saveMatch() {
  if (!S.plan || !S.date || S.saved) return;
  const { field, minutesMap, slices } = S.plan;
  const absent = ALL.filter(n => !S.present.has(n));
  const h = { ...S.hist };
  ["Jorvie", ...field].forEach(name => {
    if (!h[name]) h[name] = [];
    const m = minutesMap[name]||0;
    if (m > 0) h[name].unshift({ date: S.date, mins: m });
  });
  const rec = {
    date: S.date,
    convoked: ["Jorvie",...field].map(name => ({ name, mins: minutesMap[name]||0 })),
    absent,
    slices: slices.map((sl,i) => ({ num:i+1, dur:Math.round(sl.dur*100)/100, ...sl.ass }))
  };
  S.matches = [rec, ...S.matches];
  S.hist = h; S.saved = true;
  saveLS("accf7_h", h); saveLS("accf7_m", S.matches);
  renderMatch();
}

function clearAll() {
  if (!confirm("Effacer tout l'historique ?")) return;
  S.hist = {}; S.matches = [];
  saveLS("accf7_h", {}); saveLS("accf7_m", []);
  renderHistory();
}

// ════════════════════════════════════════════════════════
// TABS
// ════════════════════════════════════════════════════════
function showTab(tab) {
  S.tab = tab;
  ["match","history","roster"].forEach((t,i) => {
    document.querySelectorAll(".tab-btn")[i].classList.toggle("active", t===tab);
    document.getElementById("tab-"+t).style.display = t===tab ? "" : "none";
  });
  if (tab==="match")   renderMatch();
  if (tab==="history") renderHistory();
  if (tab==="roster")  renderRoster();
}

// Format minutes → "MM:SS"
function fmtTime(min) {
  const m = Math.floor(min);
  const s = Math.round((min - m) * 60);
  return `${String(m).padStart(2,"0")}:${String(s===60?s-1:s).padStart(2,"0")}`;
}

// ════════════════════════════════════════════════════════
// RENDER MATCH
// ════════════════════════════════════════════════════════
function renderMatch() {
  computeAlerts();
  const absent = ALL.filter(n => !S.present.has(n));
  let h = "";

  // Date
  h += `<div class="card">
    <label class="lbl">📅 Date du match</label>
    <input type="date" value="${S.date}"
      style="background:#1a2340;border:1.5px solid #2a3a6a;border-radius:8px;color:#e8eaf6;padding:9px 12px;font-size:14px;outline:none;width:100%;"
      onchange="S.date=this.value;S.plan=null;S.saved=false;computeAlerts();renderMatch()"/>
  </div>`;

  // Présences
  h += `<div class="card"><label class="lbl">✅ Présents (${[...S.present].length}/11)</label><div>`;
  ALL.forEach(name => {
    const p=gP(name), pi=POS[p.pos[0]], on=S.present.has(name);
    const al=S.alerts.find(a=>a.name===name);
    const bc=al&&on?(al.type==="w"?"#e74c3c":"#f39c12"):(on?pi.color:"#2a2a4a");
    h += `<span class="pill ${on?"on":""}" style="border-color:${bc};${p.fixed?"cursor:default":""}"
      onclick="toggle('${name}')">${pi.emoji} ${name}${p.fixed?" 🔒":""}${al&&on?(al.type==="w"?" ⚠️":" ℹ️"):""}</span>`;
  });
  h += `</div>`;
  if (absent.length) h += `<div style="margin-top:8px;font-size:11px;color:#e74c3c">❌ Absents : ${absent.join(", ")}</div>`;
  h += `</div>`;

  S.alerts.filter(a=>S.present.has(a.name)).forEach(a => {
    h += `<div class="alert-${a.type}">${a.type==="w"?"⚠️":"ℹ️"} <strong>${a.name}</strong> : ${a.msg}</div>`;
  });

  h += `<button class="btn-main" onclick="generate()">⚡ Générer les rotations</button>`;

  if (S.plan) {
    const { slices, minutesMap, field, exactMin, floorMin, ceilMin, nCeil, nFloor, sliceDur } = S.plan;
    const N = field.length;

    // Bannière temps de jeu
    const timeStr = Number.isInteger(exactMin)
      ? `${exactMin} min`
      : `${floorMin}-${ceilMin} min`;
    const detail = Number.isInteger(exactMin)
      ? `Tous jouent exactement ${exactMin} min`
      : `${nCeil} joueur${nCeil>1?"s":""} → ${ceilMin} min · ${nFloor} joueur${nFloor>1?"s":""} → ${floorMin} min`;

    h += `<div class="card">
      <label class="lbl">⏱ Temps de jeu · ${N} joueurs de champ</label>
      <div style="background:#071e07;border:1px solid #2ecc7166;border-radius:10px;padding:12px;margin-bottom:12px;text-align:center;">
        <div style="font-size:16px;font-weight:700;color:#2ecc71">⚽ ${timeStr} par joueur de champ</div>
        <div style="font-size:10px;color:#7986cb;margin-top:4px">${detail}</div>
        <div style="font-size:10px;color:#555;margin-top:2px">Formule : 4 postes × 50 min ÷ ${N} joueurs = ${Math.round(exactMin*100)/100} min</div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;">`;
    // Jorvie en premier
    h += `<span style="background:#0d1226;padding:5px 10px;border-radius:14px;font-size:11px;border:1px solid #f39c1255">
      <strong style="color:#f39c12">50min</strong> <span style="color:#9fa8da">🧤 Jorvie</span>
    </span>`;
    field.forEach(name => {
      const mins = minutesMap[name]||0;
      const isExtra = mins === ceilMin && !Number.isInteger(exactMin);
      h += `<span style="background:#0d1226;padding:5px 10px;border-radius:14px;font-size:11px;border:1px solid #2ecc7155">
        <strong style="color:#2ecc71">${mins}min${isExtra?" ★":""}</strong> <span style="color:#9fa8da">${name}</span>
      </span>`;
    });
    if (!Number.isInteger(exactMin)) {
      h += `<div style="width:100%;margin-top:6px;font-size:10px;color:#7986cb">★ Ces joueurs ont +1 min car ils ont moins joué cette saison — s'équilibrera au prochain match.</div>`;
    }
    h += `</div></div>`;

    // Rotations
    h += `<div class="card"><label class="lbl">🔄 ${slices.length} rotations · ${sliceDur} min chacune</label>`;
    let cumul = 0;
    slices.forEach((sl, i) => {
      const col = ROT_COLORS[i % ROT_COLORS.length];
      const tStart = fmtTime(cumul);
      const tEnd   = fmtTime(cumul + sl.dur);
      cumul += sl.dur;
      const resting = field.filter(n => !sl.team.includes(n));

      h += `<div style="background:#0a0e1a;border:2px solid ${col}55;border-radius:10px;padding:11px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;">
          <span style="font-size:12px;font-weight:700;color:${col}">Rotation ${i+1}</span>
          <span style="font-size:10px;background:${col}22;color:${col};padding:3px 8px;border-radius:8px;font-weight:700">${tStart} → ${tEnd}</span>
        </div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-bottom:${resting.length?7:0}px;">`;

      // GK fixe
      h += `<div style="background:${POS.GK.bg};border:2px solid ${POS.GK.color}66;border-radius:8px;padding:8px 4px;text-align:center;min-width:52px;flex:1">
        <div style="font-size:14px">${POS.GK.emoji}</div>
        <div style="font-size:10px;font-weight:700;color:${POS.GK.color};margin-top:2px">Jorvie</div>
        <div style="font-size:9px;color:${POS.GK.color}88">GK</div>
      </div>`;

      // 4 postes de champ
      ["DC","N7","N11","N9"].forEach(pos => {
        const name = sl.ass[pos], pi = POS[pos];
        h += `<div style="background:${pi.bg};border:2px solid ${pi.color}66;border-radius:8px;padding:8px 4px;text-align:center;min-width:52px;flex:1">
          <div style="font-size:14px">${pi.emoji}</div>
          <div style="font-size:10px;font-weight:700;color:${pi.color};margin-top:2px">${name||"—"}</div>
          <div style="font-size:9px;color:${pi.color}88">${pi.num}</div>
        </div>`;
      });

      h += `</div>`;
      if (resting.length) {
        h += `<div style="font-size:10px;color:#555;text-align:center;padding-top:2px">🪑 Repos : <span style="color:#7986cb">${resting.join(", ")}</span></div>`;
      }
      h += `</div>`;
    });
    h += `</div>`;

    h += `<button class="btn-save" onclick="saveMatch()" ${S.saved?"disabled":""}>
      ${S.saved?"✅ Match enregistré !":"💾 Valider et enregistrer ce match"}
    </button>`;
  }

  document.getElementById("tab-match").innerHTML = h;
}

// ════════════════════════════════════════════════════════
// RENDER HISTORY
// ════════════════════════════════════════════════════════
function renderHistory() {
  let h = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h2 style="font-size:15px;color:#9fa8da">📋 ${S.matches.length} match${S.matches.length>1?"s":""}</h2>
    ${S.matches.length?`<button class="btn-danger" onclick="clearAll()">🗑️ Tout effacer</button>`:""}
  </div>`;
  if (!S.matches.length) {
    h += `<div style="text-align:center;color:#555;padding:40px"><div style="font-size:36px;margin-bottom:8px">📭</div>Aucun match enregistré</div>`;
    document.getElementById("tab-history").innerHTML = h; return;
  }

  // Stats par joueur
  h += `<div class="card"><label class="lbl">👤 Stats par joueur</label>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:7px;">`;
  ALL.forEach(name => {
    const entries = S.hist[name]||[], pi = POS[gP(name).pos[0]];
    const total = entries.reduce((s,e) => s+(e.mins||0), 0);
    h += `<div style="background:#0d1226;border-radius:9px;padding:9px;border-left:3px solid ${pi.color}">
      <div style="font-weight:700;font-size:11px;margin-bottom:2px">${pi.emoji} ${name}</div>
      <div style="font-size:10px;color:#7986cb">${entries.length} convoc. · ${Math.round(total)}min</div>
      <div style="font-size:10px;color:#555">${entries.length?fmt(entries[0].date):"—"}</div>
    </div>`;
  });
  h += `</div></div>`;

  // Liste des matchs
  S.matches.forEach(m => {
    h += `<div class="card">
      <div style="font-weight:700;color:#7eb6ff;font-size:13px;margin-bottom:10px">📅 ${fmt(m.date)}</div>`;
    h += `<label class="lbl" style="margin-bottom:5px">✅ Convoqués (${m.convoked.length})</label>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;">`;
    m.convoked.forEach(c => {
      const pi = POS[gP(c.name).pos[0]];
      const col = c.name==="Jorvie"?"#f39c12":"#2ecc71";
      h += `<span style="background:#1a2a4a;padding:4px 8px;border-radius:12px;font-size:11px;border:1px solid ${pi.color}33">
        ${pi.emoji} <strong>${c.name}</strong> <span style="color:${col}">${Math.round(c.mins)}min</span>
      </span>`;
    });
    h += `</div>`;
    if (m.absent?.length) {
      h += `<label class="lbl" style="color:#e74c3c;margin-bottom:4px">❌ Absents (${m.absent.length})</label>
        <div style="display:flex;flex-wrap:wrap;gap:4px;">`;
      m.absent.forEach(name => {
        const pi = POS[gP(name).pos[0]];
        h += `<span style="background:#2d1010;padding:3px 8px;border-radius:12px;font-size:11px;color:#ff8a80">${pi.emoji} ${name}</span>`;
      });
      h += `</div>`;
    } else {
      h += `<div style="font-size:11px;color:#2ecc71">✅ Tout le monde présent !</div>`;
    }
    if (m.slices) {
      h += `<details style="margin-top:10px"><summary style="font-size:11px;color:#7986cb;cursor:pointer">Voir les rotations ▾</summary>
        <div style="margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:5px;">`;
      m.slices.forEach((sl,i) => {
        const col = ROT_COLORS[i%ROT_COLORS.length];
        h += `<div style="background:#0a0e1a;border:1px solid ${col}44;border-radius:8px;padding:8px;">
          <div style="font-size:10px;color:${col};font-weight:700;margin-bottom:5px">R${sl.num} · ${sl.dur}min</div>`;
        ["DC","N7","N11","N9"].forEach(pos => {
          if (sl[pos]) { const pi=POS[pos]; h+=`<div style="font-size:10px;color:#9fa8da">${pi.emoji} <strong>${sl[pos]}</strong> <span style="color:${pi.color}">${pi.num}</span></div>`; }
        });
        h += `</div>`;
      });
      h += `</div></details>`;
    }
    h += `</div>`;
  });
  document.getElementById("tab-history").innerHTML = h;
}

// ════════════════════════════════════════════════════════
// RENDER ROSTER
// ════════════════════════════════════════════════════════
function renderRoster() {
  let h = `<h2 style="font-size:15px;color:#9fa8da;margin-bottom:12px">👥 Effectif & postes</h2>`;
  h += `<div class="card"><label class="lbl">🏟️ Formation — 1·1·2·1</label>
    <div style="background:linear-gradient(180deg,#0d2e0d,#0a1a0a);border-radius:10px;padding:14px 8px;border:2px solid #1a5c1a;">`;
  [["N9"],["N7","N11"],["DC"],["GK"]].forEach(row => {
    h += `<div style="display:flex;justify-content:center;gap:10px;margin:5px 0;">`;
    row.forEach(pos => {
      const pi = POS[pos];
      h += `<div style="background:${pi.bg};border:2px solid ${pi.color};border-radius:8px;padding:7px 14px;text-align:center;min-width:70px">
        <div style="font-size:14px">${pi.emoji}</div>
        <div style="font-size:11px;font-weight:700;color:${pi.color}">${pi.num}</div>
        <div style="font-size:9px;color:${pi.color}88">${pi.label}</div>
      </div>`;
    });
    h += `</div>`;
  });
  h += `</div></div>`;

  // Tableau récapitulatif temps de jeu
  h += `<div class="card"><label class="lbl">📊 Temps de jeu selon effectif</label>
    <table style="width:100%;border-collapse:collapse;font-size:11px;">
      <tr style="color:#7986cb;border-bottom:1px solid #1e2d50;">
        <td style="padding:5px 8px">Joueurs de champ</td>
        <td style="padding:5px 8px;text-align:center">Total</td>
        <td style="padding:5px 8px;text-align:center">Temps chacun</td>
      </tr>`;
  [[4,50],[5,40],[6,"33-34"],[7,"28-29"],[8,25]].forEach(([n,t]) => {
    const exact = n<=5||n===8;
    h += `<tr style="border-bottom:1px solid #1e2d5033;">
      <td style="padding:5px 8px;color:#e8eaf6">${n} joueurs de champ</td>
      <td style="padding:5px 8px;text-align:center;color:#7986cb">1 GK + ${n}</td>
      <td style="padding:5px 8px;text-align:center;font-weight:700;color:${exact?"#2ecc71":"#7eb6ff"}">${t} min</td>
    </tr>`;
  });
  h += `</table></div>`;

  const byPos = {GK:[],DC:[],N7:[],N11:[],N9:[]};
  PLAYERS.forEach(p => p.pos.forEach(pos => { if(byPos[pos]) byPos[pos].push(p); }));
  SLOTS.forEach(pos => {
    const players=byPos[pos], pi=POS[pos];
    h += `<div class="card" style="border-left:4px solid ${pi.color}">
      <label class="lbl" style="color:${pi.color}">${pi.emoji} ${pi.label} — ${pi.num}</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">`;
    players.forEach(p => {
      h += `<div style="background:#0d1226;border-radius:8px;padding:6px 11px;border:1px solid ${pi.color}33;font-size:12px">
        <strong>${p.name}</strong>
        ${p.fixed?'<span style="font-size:9px;color:#f39c12;margin-left:3px">🔒</span>':""}
        ${p.pos.length>1?'<span style="font-size:9px;color:#a78bfa;margin-left:3px">✦</span>':""}
      </div>`;
    });
    h += `</div></div>`;
  });

  h += `<div class="green-note">
    ✦ <strong>Raf</strong> : DC (n°3) · Ailier G (n°7) · Ailier D (n°11) · Attaquant (n°9)<br>
    ✦ <strong>Mathias</strong> : Ailier G (n°7) · Ailier D (n°11) · Attaquant (n°9)<br>
    Postes adaptés automatiquement selon les besoins de la compo.
  </div>`;

  document.getElementById("tab-roster").innerHTML = h;
}

computeAlerts(); renderMatch();
</script>
</body>
</html>
