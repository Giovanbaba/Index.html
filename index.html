<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="ACCF Football"/>
<title>⚽ ACCF Football HOUDENG – Rotations U9B</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0e1a;color:#e8eaf6;font-family:'Trebuchet MS',sans-serif;min-height:100vh;padding-bottom:80px;}
button{cursor:pointer;font-family:'Trebuchet MS',sans-serif;}
input[type=date],input[type=number],textarea{color-scheme:dark;font-family:'Trebuchet MS',sans-serif;}
#header{background:linear-gradient(135deg,#1a237e,#283593);padding:18px 16px 12px;border-bottom:3px solid #3949ab;}
#header .sub{font-size:10px;letter-spacing:3px;color:#7986cb;margin-bottom:4px;text-transform:uppercase;}
#header h1{font-size:19px;font-weight:700;color:#fff;margin-bottom:3px;}
#header .desc{font-size:10px;color:#9fa8da;}
#tabs{background:#0d1226;border-bottom:1px solid #1a2040;display:flex;}
.tab-btn{flex:1;padding:10px 2px;background:transparent;color:#7986cb;border:none;font-size:11px;border-bottom:2px solid transparent;transition:all .2s;}
.tab-btn.active{background:#1a2a6c;color:#7eb6ff;font-weight:700;border-bottom:2px solid #3f7fff;}
#app{padding:14px 12px;max-width:760px;margin:0 auto;}
.card{background:#111827;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #1e2d50;}
.lbl{font-size:10px;color:#7986cb;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:8px;font-weight:700;}
.pill{display:inline-flex;align-items:center;gap:4px;padding:6px 11px;border-radius:18px;font-size:12px;font-weight:600;border:2px solid #2a2a4a;background:#1a1a2e;color:#555;margin:3px;transition:all .15s;cursor:pointer;}
.pill.on{background:#1a3a5c;color:#e8eaf6;}
.btn-main{width:100%;padding:12px;background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;margin-bottom:14px;box-shadow:0 4px 15px rgba(30,136,229,.3);}
.btn-save{width:100%;padding:11px;background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;margin-top:12px;}
.btn-save:disabled{background:#1b3a1b;cursor:default;}
.btn-danger{padding:5px 10px;background:#2d1010;border:1px solid #e74c3c;border-radius:8px;color:#ff8a80;font-size:11px;}
.alert-w{background:#2d1010;border:1px solid #e74c3c;border-radius:8px;padding:8px 12px;margin-bottom:7px;font-size:11px;color:#ff8a80;}
.alert-i{background:#1a2010;border:1px solid #f39c12;border-radius:8px;padding:8px 12px;margin-bottom:7px;font-size:11px;color:#ffd54f;}
.green-note{background:#1a2010;border:1px solid #33691e;border-radius:8px;padding:9px 12px;font-size:11px;color:#aed581;margin-top:6px;}
.small-note{font-size:10px;color:#7986cb;line-height:1.5;}
code.inline{background:#0d1226;border:1px solid #24345e;padding:1px 6px;border-radius:6px;color:#9ad0ff;}
</style>
</head>
<body>
<div id="header">
  <div class="sub">⚽ ACCF Football HOUDENG · U9B · 5v5</div>
  <h1>Gestionnaire Rotations</h1>
  <div class="desc">8 présents = 1 gardien fixe + 7 joueurs de champ · 7 rotations · 4 apparitions par joueur</div>
</div>
<div id="tabs">
  <button class="tab-btn active" onclick="showTab('match')">🗓️ Match</button>
  <button class="tab-btn" onclick="showTab('history')">📋 Historique</button>
  <button class="tab-btn" onclick="showTab('roster')">👥 Effectif</button>
</div>
<div id="app">
  <div id="tab-match"></div>
  <div id="tab-history" style="display:none"></div>
  <div id="tab-roster" style="display:none"></div>
</div>
<script>
const PLAYERS = [
  { name:"Jorvie",  pos:["GK"], fixed:true, preferred:["GK"] },
  { name:"Tessio",  pos:["DC"], preferred:["DC"] },
  { name:"Raf",     pos:["DC","N7","N11","N9"], preferred:["N7","N11","DC","N9"] },
  { name:"Ricardo", pos:["DC"], preferred:["DC"] },
  { name:"Simon",   pos:["DC"], preferred:["DC"] },
  { name:"Sandro",  pos:["N7","N11"], preferred:["N7","N11"] },
  { name:"Dario",   pos:["N7","N11"], preferred:["N7","N11"] },
  { name:"Thymao",  pos:["N7","N11","N9"], preferred:["N7","N11","N9"] },
  { name:"Noam",    pos:["N7","N11","N9"], preferred:["N7","N11","N9"] },
  { name:"Mathias", pos:["N7","N11","N9"], preferred:["N7","N11","N9"] },
  { name:"Isaac",   pos:["N9"], preferred:["N9"] },
];

const ALL   = PLAYERS.map(p => p.name);
const SLOTS = ["GK","DC","N7","N11","N9"];
const FIELD_POSITIONS = ["DC","N7","N11","N9"];
const TOTAL_ROTATIONS = 7;
const POS   = {
  GK:  { label:"Gardien",   num:"GK",   emoji:"🧤", color:"#f39c12", bg:"#2a1a00" },
  DC:  { label:"Défenseur", num:"n°3",  emoji:"🛡️", color:"#3498db", bg:"#001828" },
  N7:  { label:"Ailier G",  num:"n°7",  emoji:"⚡", color:"#2ecc71", bg:"#002810" },
  N11: { label:"Ailier D",  num:"n°11", emoji:"⚡", color:"#1abc9c", bg:"#002820" },
  N9:  { label:"Attaquant", num:"n°9",  emoji:"⚽", color:"#e74c3c", bg:"#280000" },
};
const ROT_COLORS = [
  "#2196f3","#9c27b0","#4caf50","#f44336",
  "#ff9800","#00bcd4","#e91e63"
];
const CORE = new Set(["Tessio","Raf","Dario","Sandro","Mathias"]);

function gP(n)     { return PLAYERS.find(p => p.name === n); }
function can(n, p) { return gP(n).pos.includes(p); }
function fmt(ds)   { if(!ds)return""; const[y,m,d]=ds.split("-"); return`${d}/${m}/${y}`; }
function daysB(d1,d2){ return Math.round((new Date(d2)-new Date(d1))/864e5); }
function loadLS(k,d){ try{ return JSON.parse(localStorage.getItem(k))||d; }catch{ return d; } }
function saveLS(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }

const S = {
  tab:"match", date:"", present:new Set(ALL),
  hist:loadLS("accf7_h",{}), matches:loadLS("accf7_m",[]),
  plan:null, alerts:[], saved:false,
  scoreNous:null, scoreEux:null, commentaire:""
};

function prefScore(name, pos) {
  const p = gP(name);
  if (!p || !p.preferred) return -1000;
  const idx = p.preferred.indexOf(pos);
  if (idx === -1) return -1000;
  return 100 - idx * 25;
}

function assignPos(team) {
  let best = null;
  let bestScore = -Infinity;
  const used = new Set();

  function bt(i, current, score) {
    if (i === FIELD_POSITIONS.length) {
      if (score > bestScore) {
        bestScore = score;
        best = { ...current };
      }
      return;
    }

    const pos = FIELD_POSITIONS[i];
    for (const name of team) {
      if (used.has(name)) continue;
      if (!can(name, pos)) continue;

      used.add(name);
      current[pos] = name;
      bt(i + 1, current, score + prefScore(name, pos));
      used.delete(name);
      delete current[pos];
    }
  }

  bt(0, {}, 0);
  return best;
}

function* combosLocal(arr, k) {
  if (k===0){yield[];return;}
  for(let i=0;i<=arr.length-k;i++)
    for(const rest of combosLocal(arr.slice(i+1),k-1))
      yield[arr[i],...rest];
}

function buildPlan(field) {
  const N = field.length;
  if (N !== 7) {
    return { error:`Il faut exactement 7 joueurs de champ sélectionnés. Actuellement : ${N}.` };
  }

  for (const pos of FIELD_POSITIONS) {
    if (!field.some(n => can(n, pos))) {
      return { error:`Aucun joueur disponible pour ${POS[pos].label} (${POS[pos].num}).` };
    }
  }

  const sliceDur = 50 / TOTAL_ROTATIONS;
  const quota = 4;

  const validTeams = [];
  for (const combo of combosLocal(field, 4)) {
    const ass = assignPos(combo);
    if (ass) {
      let posScore = 0;
      FIELD_POSITIONS.forEach(pos => { posScore += prefScore(ass[pos], pos); });
      const coreCount = combo.filter(n => CORE.has(n)).length;
      validTeams.push({ team: combo, ass, posScore, coreCount });
    }
  }

  if (!validTeams.length) {
    return { error:"Impossible de former une équipe valide avec ces 7 joueurs de champ." };
  }

  let bestPlan = null;
  let bestScore = -Infinity;

  function bt(rotationIndex, counts, plan, totalScore) {
    if (rotationIndex === TOTAL_ROTATIONS) {
      if (field.every(n => counts[n] === quota)) {
        if (totalScore > bestScore) {
          bestScore = totalScore;
          bestPlan = plan.map(sl => ({ ...sl }));
        }
      }
      return;
    }

    const remainingAfterThis = TOTAL_ROTATIONS - rotationIndex - 1;

    const candidates = validTeams.filter(({ team }) => {
      const nextCounts = { ...counts };
      for (const n of team) {
        if (nextCounts[n] >= quota) return false;
        nextCounts[n]++;
      }
      return field.every(n => (quota - nextCounts[n]) <= remainingAfterThis);
    });

    candidates.sort((a, b) => {
      if (b.posScore !== a.posScore) return b.posScore - a.posScore;
      if (b.coreCount !== a.coreCount) return b.coreCount - a.coreCount;
      return 0;
    });

    for (const cand of candidates) {
      const nextCounts = { ...counts };
      cand.team.forEach(n => nextCounts[n]++);

      const addedScore = (cand.posScore * 100) + (cand.coreCount * 10);
      bt(
        rotationIndex + 1,
        nextCounts,
        [...plan, { dur: sliceDur, team: cand.team, ass: cand.ass, posScore: cand.posScore, coreCount: cand.coreCount }],
        totalScore + addedScore
      );
    }
  }

  const initCounts = {};
  field.forEach(n => initCounts[n] = 0);
  bt(0, initCounts, [], 0);

  if (!bestPlan) {
    return { error:"Aucun plan exact trouvé : chacun doit jouer 4 rotations sur 7." };
  }

  const playCount = {};
  field.forEach(n => playCount[n] = 0);
  bestPlan.forEach(sl => sl.team.forEach(n => playCount[n]++));

  const minutesMap = { Jorvie:50 };
  field.forEach(n => minutesMap[n] = playCount[n] * sliceDur);

  let totalChanges = 0;
  for (let i=1; i<bestPlan.length; i++) {
    const prev = new Set(bestPlan[i-1].team);
    bestPlan[i].team.forEach(n => { if (!prev.has(n)) totalChanges++; });
  }

  return {
    slices: bestPlan,
    minutesMap,
    field,
    exactMin: quota * sliceDur,
    sliceDur,
    totalChanges,
    allEqual:true,
    minRots:4,
    maxRots:4
  };
}

function computeAlerts() {
  if (!S.date) { S.alerts=[]; return; }
  const out = [];
  [...S.present].filter(n => n!=="Jorvie").forEach(name => {
    const entries = (S.hist[name]||[]).sort((a,b) => b.date.localeCompare(a.date));
    if (!entries.length) return;
    const days = daysB(entries[0].date, S.date);
    if (days <= 0) return;
    const last = fmt(entries[0].date);
    if (days <= 7)       out.push({name, type:"w", msg:`Convoqué le ${last} (il y a ${days}j) — ⚠️ fatigue !`});
    else if (days <= 14) out.push({name, type:"i", msg:`Convoqué le ${last} (il y a ${days}j) — à surveiller`});
  });
  S.alerts = out;
}

function toggle(name) {
  if (gP(name).fixed) return;
  S.present.has(name) ? S.present.delete(name) : S.present.add(name);
  S.plan=null; S.saved=false; computeAlerts(); renderMatch();
}

function generate() {
  if (!S.date) { alert("Choisis une date de match !"); return; }
  const field = [...S.present].filter(n => n!=="Jorvie");
  const res = buildPlan(field);
  if (res.error) { alert(res.error); return; }
  S.plan = res; S.saved = false; renderMatch();
}

function saveMatch() {
  if (!S.plan || !S.date || S.saved) return;
  const {field, minutesMap, slices} = S.plan;
  const absent = ALL.filter(n => !S.present.has(n));
  const h = {...S.hist};

  ["Jorvie", ...field].forEach(name => {
    if (!h[name]) h[name] = [];
    const m = minutesMap[name] || 0;
    if (m > 0) h[name].unshift({ date:S.date, mins:m });
  });

  const rec = {
    date:S.date, scoreNous:S.scoreNous, scoreEux:S.scoreEux,
    commentaire:S.commentaire||"",
    convoked:["Jorvie", ...field].map(name => ({ name, mins:minutesMap[name] || 0 })),
    absent,
    slices:slices.map((sl,i) => ({num:i+1, dur:sl.dur, ...sl.ass}))
  };

  S.matches=[rec, ...S.matches];
  S.hist=h;
  S.saved=true;
  saveLS("accf7_h", h);
  saveLS("accf7_m", S.matches);
  renderMatch();
}

function clearAll() {
  if (!confirm("Effacer tout l'historique ?")) return;
  S.hist={}; S.matches=[];
  saveLS("accf7_h",{}); saveLS("accf7_m",[]);
  renderHistory();
}

function showTab(tab) {
  S.tab=tab;
  ["match","history","roster"].forEach((t,i) => {
    document.querySelectorAll(".tab-btn")[i].classList.toggle("active",t===tab);
    document.getElementById("tab-"+t).style.display = t===tab?"":"none";
  });
  if (tab==="match")   renderMatch();
  if (tab==="history") renderHistory();
  if (tab==="roster")  renderRoster();
}

function fmtTime(min) {
  const s = Math.round(min*60);
  return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
}

function fmtMinutesLabel(min) {
  const s = Math.round(min * 60);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}m${String(sec).padStart(2,"0")}`;
}

function renderMatch() {
  computeAlerts();
  const absent = ALL.filter(n => !S.present.has(n));
  const fieldCount = [...S.present].filter(n => n !== "Jorvie").length;
  let h = "";

  h += `<div class="card">
    <label class="lbl">📅 Date du match</label>
    <input type="date" value="${S.date}"
      style="background:#1a2340;border:1.5px solid #2a3a6a;border-radius:8px;color:#e8eaf6;padding:9px 12px;font-size:14px;outline:none;width:100%;"
      onchange="S.date=this.value;S.plan=null;S.saved=false;computeAlerts();renderMatch()"/>
  </div>`;

  h += `<div class="card"><label class="lbl">✅ Présents (${[...S.present].length}/11)</label><div>`;
  ALL.forEach(name => {
    const p=gP(name), pi=POS[p.pos[0]], on=S.present.has(name);
    const al=S.alerts.find(a=>a.name===name);
    const bc=al&&on?(al.type==="w"?"#e74c3c":"#f39c12"):(on?pi.color:"#2a2a4a");
    h += `<span class="pill ${on?"on":""}" style="border-color:${bc};${p.fixed?"cursor:default":""}"
      onclick="toggle('${name}')">${pi.emoji} ${name}${p.fixed?" 🔒":""}${al&&on?(al.type==="w"?" ⚠️":" ℹ️"):""}</span>`;
  });
  h += `</div>`;
  if (absent.length) h += `<div style="margin-top:8px;font-size:11px;color:#e74c3c">❌ Absents : ${absent.join(", ")}</div>`;
  h += `<div class="small-note" style="margin-top:10px">Il faut <strong>obligatoirement 8 présents</strong> : <strong>Jorvie</strong> + <strong>7 joueurs de champ</strong>. Chacun des 7 joueurs de champ jouera <strong>4 rotations sur 7</strong>, soit <strong>${fmtMinutesLabel(4*(50/7))}</strong>.</div>`;
  h += `</div>`;

  if (fieldCount !== 7) {
    h += `<div class="alert-w">⚠️ Configuration invalide : il y a actuellement <strong>${fieldCount}</strong> joueurs de champ sélectionnés. Il en faut exactement <strong>7</strong> avec Jorvie au goal.</div>`;
  }

  S.alerts.filter(a=>S.present.has(a.name)).forEach(a => {
    h += `<div class="alert-${a.type}">${a.type==="w"?"⚠️":"ℹ️"} <strong>${a.name}</strong> : ${a.msg}</div>`;
  });

  h += `<button class="btn-main" onclick="generate()">⚡ Générer les rotations</button>`;

  if (S.plan) {
    const {slices, minutesMap, field, exactMin, sliceDur, totalChanges} = S.plan;

    h += `<div class="card">
      <label class="lbl">⏱ Temps de jeu exact</label>
      <div style="background:#071e07;border:1px solid #2ecc7166;border-radius:10px;padding:12px;margin-bottom:12px;text-align:center;">
        <div style="font-size:16px;font-weight:700;color:#2ecc71">⚽ ${fmtMinutesLabel(exactMin)} par joueur de champ</div>
        <div style="font-size:10px;color:#7986cb;margin-top:4px">7 rotations · 4 apparitions chacun · ${totalChanges} changements</div>
        <div style="font-size:10px;color:#555;margin-top:2px">Aucun joueur de champ n'est en dessous ou au-dessus : tout le monde joue exactement 4 fois.</div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;">`;

    h += `<span style="background:#0d1226;padding:5px 10px;border-radius:14px;font-size:11px;border:1px solid #f39c1255">
      <strong style="color:#f39c12">50m00</strong> <span style="color:#9fa8da">🧤 Jorvie</span></span>`;

    field.forEach(name => {
      const isCore = CORE.has(name);
      const mins = minutesMap[name];
      const border = isCore ? '#9333ea55' : '#2ecc7155';
      const text = isCore ? '#c084fc' : '#2ecc71';
      h += `<span style="background:#0d1226;padding:5px 10px;border-radius:14px;font-size:11px;border:1px solid ${border}">
        <strong style="color:${text}">${fmtMinutesLabel(mins)}</strong>
        <span style="color:#9fa8da">${name}${isCore?' ⭐':''}</span></span>`;
    });

    h += `</div>
      <div style="margin-top:8px;font-size:10px;color:#7986cb">Priorités intégrées : 1) 4 rotations chacun 2) poste préféré 3) noyau dur dans les solutions équivalentes</div>
    </div>`;

    h += `<div class="card"><label class="lbl">🔄 ${slices.length} rotations · ${fmtMinutesLabel(sliceDur)} chacune</label>`;
    let cumul = 0;
    slices.forEach((sl, i) => {
      const col = ROT_COLORS[i % ROT_COLORS.length];
      const tStart = fmtTime(cumul), tEnd = fmtTime(cumul + sl.dur);
      cumul += sl.dur;
      const resting = field.filter(n => !sl.team.includes(n));
      let entrants = [];
      if (i > 0) {
        const prev = new Set(slices[i-1].team);
        entrants = sl.team.filter(n => !prev.has(n));
      }
      const coreInRot = sl.team.filter(n => CORE.has(n)).length;
      const badge = coreInRot >= 3
        ? `<span style="font-size:9px;background:#2a1040;color:#c084fc;padding:2px 7px;border-radius:6px;border:1px solid #9333ea55">⭐ Noyau ${coreInRot}/4</span>`
        : `<span style="font-size:9px;color:#555">Noyau ${coreInRot}/4</span>`;
      const changeBadge = i===0 ? ``
        : entrants.length===0
          ? `<span style="font-size:9px;background:#1a3a1a;color:#2ecc71;padding:2px 7px;border-radius:6px;border:1px solid #2ecc7144">✓ Inchangée</span>`
          : `<span style="font-size:9px;background:#1a1a3a;color:#7eb6ff;padding:2px 7px;border-radius:6px;border:1px solid #3f7fff44">↔ ${entrants.join(", ")}</span>`;

      h += `<div style="background:#0a0e1a;border:2px solid ${coreInRot>=3?'#9333ea':col}55;border-radius:10px;padding:11px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;flex-wrap:wrap;gap:4px;">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <span style="font-size:12px;font-weight:700;color:${col}">Rotation ${i+1}</span>
            ${badge} ${changeBadge}
          </div>
          <span style="font-size:10px;background:${col}22;color:${col};padding:3px 8px;border-radius:8px;font-weight:700">${tStart} → ${tEnd}</span>
        </div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-bottom:${resting.length?7:0}px;">`;

      h += `<div style="background:${POS.GK.bg};border:2px solid ${POS.GK.color}66;border-radius:8px;padding:8px 4px;text-align:center;min-width:52px;flex:1">
        <div style="font-size:14px">${POS.GK.emoji}</div>
        <div style="font-size:10px;font-weight:700;color:${POS.GK.color};margin-top:2px">Jorvie</div>
        <div style="font-size:9px;color:${POS.GK.color}88">GK</div>
      </div>`;

      FIELD_POSITIONS.forEach(pos => {
        const name=sl.ass[pos], pi=POS[pos];
        const isNew = entrants.includes(name);
        const isCore2 = CORE.has(name);
        const pScore = prefScore(name, pos);
        const prefTag = pScore >= 100 ? '✅ préféré' : pScore >= 75 ? '👍 OK' : '🛠 dépannage';
        h += `<div style="background:${pi.bg};border:2px solid ${isNew?pi.color:pi.color+'33'};border-radius:8px;padding:8px 4px;text-align:center;min-width:52px;flex:1${isNew?';box-shadow:0 0 8px '+pi.color+'44':''}">
          <div style="font-size:14px">${pi.emoji}</div>
          <div style="font-size:10px;font-weight:700;color:${pi.color};margin-top:2px">${name||"—"}</div>
          <div style="font-size:9px;color:${pi.color}66">${pi.num}${isCore2?' ⭐':''}</div>
          <div style="font-size:8px;color:#9fa8da;margin-top:3px">${prefTag}</div>
        </div>`;
      });

      h += `</div>`;
      if (resting.length) {
        h += `<div style="font-size:10px;color:#555;text-align:center;padding-top:2px">🪑 Repos : <span style="color:#7986cb">${resting.join(", ")}</span></div>`;
      }
      h += `</div>`;
    });
    h += `</div>`;

    if (!S.saved) {
      h += `<div class="card">
        <label class="lbl">🏆 Score & souvenir</label>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
          <span style="font-size:11px;color:#9fa8da;white-space:nowrap">ACCF Houdeng</span>
          <input type="number" min="0" max="99" value="${S.scoreNous??''}" placeholder="0"
            style="width:52px;background:#1a2340;border:1.5px solid #2a3a6a;border-radius:8px;color:#e8eaf6;padding:8px;font-size:18px;font-weight:700;text-align:center;outline:none;"
            oninput="S.scoreNous=this.value===''?null:parseInt(this.value)"/>
          <span style="font-size:18px;font-weight:700;color:#7986cb">—</span>
          <input type="number" min="0" max="99" value="${S.scoreEux??''}" placeholder="0"
            style="width:52px;background:#1a2340;border:1.5px solid #2a3a6a;border-radius:8px;color:#e8eaf6;padding:8px;font-size:18px;font-weight:700;text-align:center;outline:none;"
            oninput="S.scoreEux=this.value===''?null:parseInt(this.value)"/>
          <span style="font-size:11px;color:#9fa8da;white-space:nowrap">Adversaire</span>
        </div>
        <textarea placeholder="Commentaire (ambiance, buts marqués, anecdotes...)" rows="3"
          style="width:100%;background:#1a2340;border:1.5px solid #2a3a6a;border-radius:8px;color:#e8eaf6;padding:9px 12px;font-size:12px;outline:none;resize:none;font-family:'Trebuchet MS',sans-serif;"
          oninput="S.commentaire=this.value">${S.commentaire||""}</textarea>
      </div>`;
    }

    h += `<button class="btn-save" onclick="saveMatch()" ${S.saved?"disabled":""}>
      ${S.saved?"✅ Match enregistré !":"💾 Valider et enregistrer ce match"}
    </button>`;
  }

  document.getElementById("tab-match").innerHTML = h;
}

function renderHistory() {
  let h = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h2 style="font-size:15px;color:#9fa8da">📋 ${S.matches.length} match${S.matches.length>1?"s":""}</h2>
    ${S.matches.length?`<button class="btn-danger" onclick="clearAll()">🗑️ Tout effacer</button>`:""}
  </div>`;

  if (!S.matches.length) {
    h += `<div style="text-align:center;color:#555;padding:40px"><div style="font-size:36px;margin-bottom:8px">📭</div>Aucun match enregistré</div>`;
    document.getElementById("tab-history").innerHTML=h; return;
  }

  h += `<div class="card"><label class="lbl">👤 Stats par joueur</label>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:7px;">`;
  ALL.forEach(name => {
    const entries=S.hist[name]||[], pi=POS[gP(name).pos[0]];
    const total=entries.reduce((s,e)=>s+(e.mins||0),0);
    h += `<div style="background:#0d1226;border-radius:9px;padding:9px;border-left:3px solid ${pi.color}">
      <div style="font-weight:700;font-size:11px;margin-bottom:2px">${pi.emoji} ${name}${CORE.has(name)?' ⭐':''}</div>
      <div style="font-size:10px;color:#7986cb">${entries.length} convoc. · ${fmtMinutesLabel(total)}</div>
      <div style="font-size:10px;color:#555">${entries.length?fmt(entries[0].date):"—"}</div>
    </div>`;
  });
  h += `</div></div>`;

  S.matches.forEach(m => {
    const hasScore = m.scoreNous!=null && m.scoreEux!=null;
    let resultBadge = "";
    if (hasScore) {
      const win=m.scoreNous>m.scoreEux, draw=m.scoreNous===m.scoreEux;
      const col=win?"#2ecc71":draw?"#f39c12":"#e74c3c";
      const lbl=win?"VICTOIRE 🏆":draw?"NUL 🤝":"DÉFAITE";
      resultBadge=`<span style="background:${col}22;color:${col};border:1px solid ${col}55;border-radius:8px;padding:3px 10px;font-size:11px;font-weight:700">${lbl}</span>`;
    }

    h += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px;">
        <div style="font-weight:700;color:#7eb6ff;font-size:13px">📅 ${fmt(m.date)}</div>
        ${resultBadge}
      </div>`;

    if (hasScore) {
      const win=m.scoreNous>m.scoreEux, draw=m.scoreNous===m.scoreEux;
      const sc=win?"#2ecc71":draw?"#f39c12":"#e74c3c";
      h += `<div style="text-align:center;background:#0d1226;border-radius:10px;padding:10px;margin-bottom:10px;border:1px solid ${sc}44;">
        <div style="font-size:22px;font-weight:700;color:${sc}">${m.scoreNous} — ${m.scoreEux}</div>
        <div style="font-size:10px;color:#7986cb;margin-top:2px">ACCF Houdeng vs Adversaire</div>
      </div>`;
    }

    if (m.commentaire) {
      h += `<div style="background:#0d1226;border-left:3px solid #7986cb;border-radius:0 8px 8px 0;padding:8px 12px;margin-bottom:10px;font-size:11px;color:#c5cae9;font-style:italic">
        💬 ${m.commentaire.split('\n').join('<br>')}
      </div>`;
    }

    h += `<label class="lbl" style="margin-bottom:5px">✅ Convoqués (${m.convoked.length})</label>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;">`;
    m.convoked.forEach(c => {
      const pi=POS[gP(c.name).pos[0]];
      const col=c.name==="Jorvie"?"#f39c12":"#2ecc71";
      h += `<span style="background:#1a2a4a;padding:4px 8px;border-radius:12px;font-size:11px;border:1px solid ${pi.color}33">
        ${pi.emoji} <strong>${c.name}</strong> <span style="color:${col}">${fmtMinutesLabel(c.mins)}</span></span>`;
    });
    h += `</div>`;

    if (m.absent?.length) {
      h += `<label class="lbl" style="color:#e74c3c;margin-bottom:4px">❌ Absents (${m.absent.length})</label>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;">`;
      m.absent.forEach(name => {
        const pi=POS[gP(name).pos[0]];
        h += `<span style="background:#2d1010;padding:3px 8px;border-radius:12px;font-size:11px;color:#ff8a80">${pi.emoji} ${name}</span>`;
      });
      h += `</div>`;
    } else {
      h += `<div style="font-size:11px;color:#2ecc71;margin-bottom:10px">✅ Tout le monde présent !</div>`;
    }

    if (m.slices?.length) {
      h += `<details><summary style="font-size:11px;color:#7986cb;cursor:pointer;padding:4px 0">🔄 Voir les ${m.slices.length} rotations ▾</summary>
        <div style="margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:5px;">`;
      m.slices.forEach((sl,i) => {
        const col=ROT_COLORS[i%ROT_COLORS.length];
        let cumul=0; for(let k=0;k<i;k++) cumul+=m.slices[k].dur;
        h += `<div style="background:#0a0e1a;border:1px solid ${col}44;border-radius:8px;padding:8px;">
          <div style="font-size:10px;color:${col};font-weight:700;margin-bottom:6px">R${sl.num} · ${fmtTime(cumul)}→${fmtTime(cumul+sl.dur)}</div>
          <div style="font-size:9px;color:#555;margin-bottom:4px">${POS.GK.emoji} Jorvie GK</div>`;
        FIELD_POSITIONS.forEach(pos => {
          if(sl[pos]) {
            const pi=POS[pos];
            h += `<div style="font-size:10px;color:#9fa8da;margin-bottom:2px">${pi.emoji} <strong>${sl[pos]}</strong> <span style="color:${pi.color}">${pi.num}</span></div>`;
          }
        });
        h += `</div>`;
      });
      h += `</div></details>`;
    }
    h += `</div>`;
  });

  document.getElementById("tab-history").innerHTML = h;
}

function renderRoster() {
  let h = `<h2 style="font-size:15px;color:#9fa8da;margin-bottom:12px">👥 Effectif & postes</h2>`;
  h += `<div class="card"><label class="lbl">🏟️ Formation — 1·1·2·1</label>
    <div style="background:linear-gradient(180deg,#0d2e0d,#0a1a0a);border-radius:10px;padding:14px 8px;border:2px solid #1a5c1a;">`;
  [["N9"],["N7","N11"],["DC"],["GK"]].forEach(row => {
    h += `<div style="display:flex;justify-content:center;gap:10px;margin:5px 0;">`;
    row.forEach(pos => {
      const pi=POS[pos];
      h += `<div style="background:${pi.bg};border:2px solid ${pi.color};border-radius:8px;padding:7px 14px;text-align:center;min-width:70px">
        <div style="font-size:14px">${pi.emoji}</div>
        <div style="font-size:11px;font-weight:700;color:${pi.color}">${pi.num}</div>
        <div style="font-size:9px;color:${pi.color}88">${pi.label}</div>
      </div>`;
    });
    h += `</div>`;
  });
  h += `</div></div>`;

  h += `<div class="card"><label class="lbl">📊 Règle de match utilisée</label>
    <div class="small-note">
      Le générateur est volontairement strict : <strong>Jorvie fixe</strong> + <strong>7 joueurs de champ</strong>.<br>
      Il construit <strong>7 rotations</strong> et impose <strong>4 présences par joueur</strong>.<br>
      Ensuite il maximise le <strong>poste préféré</strong>, puis seulement après le <strong>noyau dur</strong>.<br>
      Pour <strong>Raf</strong>, l'ordre est : <code class="inline">N7</code> → <code class="inline">N11</code> → <code class="inline">DC</code> → <code class="inline">N9</code>.
    </div>
  </div>`;

  const byPos={GK:[],DC:[],N7:[],N11:[],N9:[]};
  PLAYERS.forEach(p => p.pos.forEach(pos => { if(byPos[pos]) byPos[pos].push(p); }));

  SLOTS.forEach(pos => {
    const players=byPos[pos], pi=POS[pos];
    h += `<div class="card" style="border-left:4px solid ${pi.color}">
      <label class="lbl" style="color:${pi.color}">${pi.emoji} ${pi.label} — ${pi.num}</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">`;
    players.forEach(p => {
      const pref = p.preferred ? p.preferred.join(' · ') : p.pos.join(' · ');
      h += `<div style="background:#0d1226;border-radius:8px;padding:6px 11px;border:1px solid ${pi.color}33;font-size:12px">
        <strong>${p.name}</strong>
        ${p.fixed?'<span style="font-size:9px;color:#f39c12;margin-left:3px">🔒</span>':''}
        ${CORE.has(p.name)?'<span style="font-size:9px;color:#c084fc;margin-left:3px">⭐</span>':''}
        <div style="font-size:9px;color:#7986cb;margin-top:3px">Préférence : ${pref}</div>
      </div>`;
    });
    h += `</div></div>`;
  });

  h += `<div class="green-note">
    ⭐ <strong>Noyau dur</strong> : Tessio · Raf · Dario · Sandro · Mathias<br>
    ✅ <strong>Priorité réelle du moteur</strong> : égalité parfaite d'abord, poste préféré ensuite, noyau dur seulement pour départager les solutions équivalentes.<br>
    ⚡ <strong>Raf</strong> est priorisé en <strong>7 / 11</strong>, puis <strong>3</strong> ou <strong>9</strong> seulement si nécessaire.
  </div>`;

  document.getElementById("tab-roster").innerHTML = h;
}

computeAlerts();
renderMatch();
</script>
